name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'front_despacho/**'
      - '.github/workflows/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/despacho-front:latest ./front_despacho

      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/despacho-front:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy frontend in EC2 with SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.FRONTEND_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /home/ec2-user/app",
              "docker compose pull",
              "docker compose up -d"
            ]' \
            --comment "Deploy frontend" \
            --region ${{ secrets.AWS_REGION }}
